<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier une dépense</title>
</head>
<body>

<h2>Modifier une dépense</h2>

<form>

    <label>Choisir une dépense :</label><br>
    <select>
        <option>Restaurant - 50€</option>
        <option>Hôtel - 200€</option>
    </select><br><br>

    <label>Nom :</label><br>
    <input type="text" value="Restaurant"><br><br>

    <label>Montant :</label><br>
    <input type="number" value="50"><br><br>

    <label>Payé par :</label><br>
    <select>
        <option>Luca</option>
        <option>Doryann</option>
    </select><br><br>

    <button type="submit">Modifier</button>

</form>

</body>
</html>
