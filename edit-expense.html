<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripMate - Modifier une dépense</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #00C9A7, #4A6CF7);
}
.card {
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container mt-5">
    <div class="text-center mb-4 text-white">
        <h1> Modifier une dépense</h1>
    </div>

    <div class="card p-4 shadow">
        <form>

            <div class="mb-3">
                <label class="form-label">Choisir une dépense</label>
                <select class="form-select">
                    <option>Restaurant - 80€</option>
                    <option>Hôtel - 200€</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" value="Restaurant">
            </div>

            <div class="mb-3">
                <label class="form-label">Montant</label>
                <input type="number" class="form-control" value="80">
            </div>

            <div class="mb-3">
                <label class="form-label">Payé par</label>
                <select class="form-select">
                    <option selected>Luca</option>
                    <option>Doryann</option>
                </select>
            </div>

            <button class="btn btn-warning w-100">Sauvegarder les modifications</button>

        </form>
    </div>
</div>

</body>
</html>
