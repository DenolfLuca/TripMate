<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripMate - Modifier une dépense</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #F4F6F9;
}

.navbar {
    background-color: #1E3A5F;
}

.btn-warning {
    background-color: #E09F3E;
    border: none;
    color: white;
}

.card {
    border-radius: 12px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">TripMate</span>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Modifier une dépense</h2>

    <div class="card shadow p-4">
        <form>

            <div class="mb-3">
                <label class="form-label">Sélectionner une dépense</label>
                <select class="form-select">
                    <option>Restaurant - 80€</option>
                    <option>Hôtel - 200€</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" value="Restaurant">
            </div>

            <div class="mb-3">
                <label class="form-label">Montant</label>
                <input type="number" class="form-control" value="80">
            </div>

            <div class="mb-4">
                <label class="form-label">Payé par</label>
                <select class="form-select">
                    <option selected>Luca</option>
                    <option>Doryann</option>
                    <option>Julian</option>
                    <option>Lina</option>
                </select>
            </div>

            <button class="btn btn-warning w-100">Sauvegarder les modifications</button>

        </form>
    </div>
</div>

</body>
</html>
