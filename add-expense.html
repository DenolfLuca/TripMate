<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripMate - Ajouter une dépense</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #F4F6F9;
}

.navbar {
    background-color: #1E3A5F;
}

.btn-primary {
    background-color: #2A6F97;
    border: none;
}

.card {
    border-radius: 12px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">TripMate</span>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Ajouter une dépense</h2>

    <div class="card shadow p-4">
        <form>

            <div class="mb-3">
                <label class="form-label">Nom de la dépense</label>
                <input type="text" class="form-control" placeholder="Ex : Restaurant">
            </div>

            <div class="mb-3">
                <label class="form-label">Montant (€)</label>
                <input type="number" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Payé par</label>
                <select class="form-select">
                    <option>Luca</option>
                    <option>Doryann</option>
                    <option>Julian</option>
                    <option>Lina</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Participants concernés</label>
                <select class="form-select" multiple>
                    <option>Luca</option>
                    <option>Doryann</option>
                    <option>Julian</option>
                    <option>Lina</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control">
            </div>

            <div class="mb-4">
                <label class="form-label">Catégorie</label>
                <select class="form-select">
                    <option>Transport</option>
                    <option>Logement</option>
                    <option>Nourriture</option>
                    <option>Activité</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">Ajouter la dépense</button>

        </form>
    </div>
</div>

</body>
</html>
