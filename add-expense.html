<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une dépense</title>
</head>
<body>

<h2>Ajouter une dépense</h2>

<form>
    <label>Nom de la dépense :</label><br>
    <input type="text" name="nom"><br><br>

    <label>Montant (€) :</label><br>
    <input type="number" name="montant"><br><br>

    <label>Payé par :</label><br>
    <select name="payer">
        <option>Luca</option>
        <option>Doryann</option>
        <option>Julian</option>
        <option>Lina</option>
    </select><br><br>

    <label>Participants :</label><br>
    <select multiple>
        <option>Luca</option>
        <option>Doryann</option>
        <option>Julian</option>
        <option>Lina</option>
    </select><br><br>

    <label>Date :</label><br>
    <input type="date"><br><br>

    <label>Catégorie :</label><br>
    <select>
        <option>Transport</option>
        <option>Logement</option>
        <option>Nourriture</option>
        <option>Activité</option>
    </select><br><br>

    <button type="submit">Ajouter</button>
</form>

</body>
</html>
