<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripMate - Choisir un voyage</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #6C5CE7, #4A6CF7);
}
.card {
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container mt-5">
    <div class="text-center text-white mb-4">
        <h1>🌍 Choisir un voyage</h1>
        <p>Sélectionnez un voyage pour continuer</p>
    </div>

    <div class="card p-4 shadow text-center">
        <form>

            <div class="mb-3">
                <label class="form-label">Voyage</label>
                <select class="form-select">
                    <option>Paris 2026</option>
                    <option>Espagne 2025</option>
                    <option>Italie 2024</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">Accéder au voyage</button>

        </form>
    </div>
</div>

</body>
</html>
