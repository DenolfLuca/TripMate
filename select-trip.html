<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripMate - Choisir un voyage</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #F4F6F9;
}

.navbar {
    background-color: #1E3A5F;
}

.btn-success {
    background-color: #2A9D8F;
    border: none;
}

.card {
    border-radius: 12px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">TripMate</span>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Choisir un voyage</h2>

    <div class="card shadow p-4">
        <form>

            <div class="mb-4">
                <label class="form-label">Sélectionner un voyage</label>
                <select class="form-select">
                    <option>Paris 2026</option>
                    <option>Espagne 2025</option>
                    <option>Italie 2024</option>
                </select>
            </div>

            <button class="btn btn-success w-100">Accéder au voyage</button>

        </form>
    </div>
</div>

</body>
</html>
